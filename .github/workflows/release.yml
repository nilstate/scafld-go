name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  id-token: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: https://registry.npmjs.org
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: make check

  github-release:
    needs: check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - run: scripts/build-release-artifacts.sh "${GITHUB_REF_NAME#v}"
      - run: gh release create "$GITHUB_REF_NAME" dist/* --verify-tag --generate-notes
        env:
          GH_TOKEN: ${{ github.token }}

  npm:
    needs: github-release
    runs-on: ubuntu-latest
    environment: npm
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: https://registry.npmjs.org
      - run: scripts/set-release-version.sh "${GITHUB_REF_NAME#v}"
      - run: npm test
        working-directory: package/npm
      - run: npm publish --access public
        working-directory: package/npm

  pypi:
    needs: github-release
    runs-on: ubuntu-latest
    environment: pypi
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: scripts/set-release-version.sh "${GITHUB_REF_NAME#v}"
      - run: python -m pip install --upgrade build
      - run: python -m build
        working-directory: package/pypi
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: package/pypi/dist
